services:
  db:
    image: postgres:16
    container_name: pgmsngr-db
    restart: always
    command: 
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=10"
    environment:
      - POSTGRES_DB=PGMSNGR
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      # --- 1. Infrastructure (Extensions & Base Schemas) ---
      - ./init/pgcrypto.sql:/docker-entrypoint-initdb.d/00-pgcrypto.sql
      - ./schema/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./init/roles.sql:/docker-entrypoint-initdb.d/02-roles.sql

      # --- 2. Types & JWT Support ---
      - ./init/pgjwt_source.sql:/docker-entrypoint-initdb.d/03-pgjwt.sql
      - ./init/jwt_token.sql:/docker-entrypoint-initdb.d/04-jwt-type.sql
      - ./init/text_html.sql:/docker-entrypoint-initdb.d/05-text-html-type.sql

      # --- 3. Table Dependencies (Helper functions used as defaults) ---
      - ./stored_functions/auth_profile_id.sql:/docker-entrypoint-initdb.d/10-auth-helper.sql

      # --- 4. Tables & Indexes ---
      - ./schema/table_index_ddl.sql:/docker-entrypoint-initdb.d/11-tables.sql
      - ./init/realtime_pubication.sql:/docker-entrypoint-initdb.d/12-realtime.sql

      # --- 5. Views ---
      - ./schema/inbox_view.sql:/docker-entrypoint-initdb.d/20-inbox-view.sql
      - ./schema/archive_view.sql:/docker-entrypoint-initdb.d/21-archive-view.sql
      - ./schema/my_account_view.sql:/docker-entrypoint-initdb.d/22-account-view.sql

      # --- 6. API Stored Functions ---
      - ./stored_functions/get_my_conversation_ids.sql:/docker-entrypoint-initdb.d/30-conv-ids.sql
      - ./stored_functions/is_admin_of.sql:/docker-entrypoint-initdb.d/31-admin-check.sql
      - ./stored_functions/authenticate.sql:/docker-entrypoint-initdb.d/32-authenticate.sql
      - ./stored_functions/register_account.sql:/docker-entrypoint-initdb.d/33-register.sql
      - ./stored_functions/change_password.sql:/docker-entrypoint-initdb.d/34-password.sql
      - ./stored_functions/create_chat.sql:/docker-entrypoint-initdb.d/35-create-chat.sql
      - ./stored_functions/create_group_chat.sql:/docker-entrypoint-initdb.d/36-create-group.sql
      - ./stored_functions/hide_chat.sql:/docker-entrypoint-initdb.d/37-hide-chat.sql
      - ./stored_functions/unarchive_chat.sql:/docker-entrypoint-initdb.d/38-unarchive-chat.sql

      # --- 7. Security (RLS Policies) ---
      - ./RLS_policies/rls_account.sql:/docker-entrypoint-initdb.d/40-rls-account.sql
      - ./RLS_policies/rls_profile.sql:/docker-entrypoint-initdb.d/41-rls-profile.sql
      - ./RLS_policies/rls_chat.sql:/docker-entrypoint-initdb.d/42-rls-chat.sql
      - ./RLS_policies/rls_group_chat.sql:/docker-entrypoint-initdb.d/43-rls-group.sql
      - ./RLS_policies/rls_block.sql:/docker-entrypoint-initdb.d/44-rls-block.sql

      # --- 8. Triggers ---
      - ./triggers/activate_chat_trigger.sql:/docker-entrypoint-initdb.d/50-trig-activate.sql
      - ./triggers/broadcast_conversation_events.sql:/docker-entrypoint-initdb.d/51-trig-broadcast-conv.sql
      - ./triggers/broadcast_message_events.sql:/docker-entrypoint-initdb.d/52-trig-broadcast-msg.sql
      - ./triggers/enforce_admin_presence_trigger.sql:/docker-entrypoint-initdb.d/53-trig-admin.sql
      - ./triggers/enforce_message_blocks.sql:/docker-entrypoint-initdb.d/54-trig-blocks.sql

      # --- 9. Frontend Rendering ---
      - ./frontend/render_inbox.sql:/docker-entrypoint-initdb.d/60-render-inbox.sql
      - ./frontend/render_archive.sql:/docker-entrypoint-initdb.d/61-render-archive.sql
      - ./frontend/render_chat.sql:/docker-entrypoint-initdb.d/62-render-chat.sql
      - ./frontend/render_message_bubble.sql:/docker-entrypoint-initdb.d/63-render-bubble.sql
      - ./frontend/render_edit_message.sql:/docker-entrypoint-initdb.d/64-render-edit.sql
      - ./frontend/render_settings.sql:/docker-entrypoint-initdb.d/65-render-settings.sql
      - ./frontend/app.sql:/docker-entrypoint-initdb.d/66-app.sql
      - ./frontend/index.sql:/docker-entrypoint-initdb.d/67-index.sql
      - ./frontend/render_user_directory.sql:/docker-entrypoint-initdb.d/68-render-user-directory.sql

      # --- 10. Permissions ---
      - ./init/permissions.sql:/docker-entrypoint-initdb.d/70-permissions.sql

    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PGMSNGR"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest
    container_name: pgmsngr-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PGRST_DB_URI=postgres://authenticator:1234@db:5432/PGMSNGR
      - PGRST_DB_SCHEMAS=api
      - PGRST_DB_ANON_ROLE=web_anon
      - PGRST_JWT_SECRET=thisstringissoverysecretextrachars
      - PGRST_LOG_LEVEL=info
      - PGRST_RAW_MEDIA_TYPES=text/html, text/css, image/png
    depends_on:
      db:
        condition: service_healthy

  realtime:
    image: supabase/realtime:v2.30.0
    container_name: pgmsngr-realtime
    restart: always
    ports:
      - "4000:4000"
    environment:
      # --- 1. Database Connection ---
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=PGMSNGR
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      
      # --- 2. Phoenix Framework Core (The strict stuff) ---
      - PORT=4000
      - APP_NAME=pgmsngr_realtime
      - SECRET_KEY_BASE=i_am_legit_going_to_lose_my_freaking_mind_but_i_wont_give_up
      - RLIMIT_NOFILE=10000
      
      # --- 3. Security & Authentication ---
      - JWT_SECRET=thisstringissoverysecretextrachars
      - API_JWT_SECRET=thisstringissoverysecretextrachars
      
      # --- 4. WebSocket & RLS Settings ---
      - REPLICATION_MODE=RLS 
      - SECURE_CHANNELS=true
      - SLOT_NAME=supabase_realtime_rls
      - TENANT_ID=pgmsngr

    depends_on:
      db:
        condition: service_healthy
